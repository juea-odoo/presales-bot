name: Odoo to Discord digest

on:
  schedule:
    - cron: "13 10,12,14,17,19,20,21,22 * * *"   # 8am, 10am, 1pm, 3pm, 4pm, 5pm, 6pm ET (EDT/UTC-4)
  workflow_dispatch: {}     # adds a "Run workflow" button so you can test manually

permissions:
  contents: write            # lets the workflow save seen.txt back to the repo

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run the digest
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python notify.py

      - name: Save the list of reported tasks
        run: |
          git config user.name "notifier-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.txt
          git diff --staged --quiet || git commit -m "Update reported tasks"
          git push
